<style>
  :root {
    color-scheme: dark;
    --navy:   #001E3C;
    --navy-2: #0A2E52;
    --gold:   #B08D57;
    --cream:  #F2E9DC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    color: var(--cream);
    background:
      radial-gradient(ellipse at top, var(--navy-2) 0%, var(--navy) 60%, #000814 100%);
    background-attachment: fixed;
    overflow: hidden;
    font-family: "Didot", "Bodoni 72", "Times New Roman", serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: env(safe-area-inset-top) 28px env(safe-area-inset-bottom);
  }
  .logo {
    width: 200px;
    max-width: 65vw;
    height: auto;
    margin-bottom: 28px;
    opacity: .95;
  }
  .rule {
    width: 56px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 22px;
    opacity: .8;
  }
  h1 {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
  }
  .sub {
    font-style: italic;
    font-size: 19px;
    opacity: .85;
    margin-bottom: 40px;
    letter-spacing: .3px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }
  .cell {
    border: 1px solid rgba(176, 141, 87, .35);
    border-radius: 4px;
    padding: 16px 4px 12px;
    background: rgba(255,255,255,.02);
  }
  .num {
    font-size: 32px;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    color: var(--cream);
    font-family: "Didot", "Bodoni 72", serif;
  }
  .lbl {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--gold);
    margin-top: 10px;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
  }
  .when {
    margin-top: 36px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: .55;
    color: var(--cream);
    font-family: -apple-system, "Helvetica Neue", sans-serif;
  }
  .place {
    margin-top: 6px;
    font-style: italic;
    font-size: 13px;
    opacity: .65;
  }
</style>

  <div class="grid">
    <div class="cell"><div class="num" id="d">–</div><div class="lbl">Days</div></div>
    <div class="cell"><div class="num" id="h">–</div><div class="lbl">Hours</div></div>
    <div class="cell"><div class="num" id="m">–</div><div class="lbl">Min</div></div>
    <div class="cell"><div class="num" id="s">–</div><div class="lbl">Sec</div></div>
  </div>

  <div class="when">26 July 2026 · 07:00</div>
  <div class="place">Melbourne departure</div>

<script>
  // 07:00 AEST (Melbourne, July = no DST) = 21:00 UTC on 25 July
  const target = Date.UTC(2026, 6, 25, 21, 0, 0);
  const $ = id => document.getElementById(id);
  function tick() {
    let diff = Math.max(0, target - Date.now());
    const d = Math.floor(diff / 86400000); diff -= d * 86400000;
    const h = Math.floor(diff / 3600000);  diff -= h * 3600000;
    const m = Math.floor(diff / 60000);    diff -= m * 60000;
    const s = Math.floor(diff / 1000);
    $('d').textContent = d;
    $('h').textContent = String(h).padStart(2,'0');
    $('m').textContent = String(m).padStart(2,'0');
    $('s').textContent = String(s).padStart(2,'0');
  }
  tick(); setInterval(tick, 1000);
</script>
